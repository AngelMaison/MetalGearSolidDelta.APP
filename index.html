<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MGS DELTA">
<title>MGS DELTA — CODEC GUIDE</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
--p:#7aff5a;--pd:#3a8c26;--pg:rgba(122,255,90,.12);
--bg:#0d1208;--c1:#0f1509;--c2:#131a0c;
--cr:#e8dfc0;--am:#d4a017;--rd:#c0392b;
--bt:#7a9060;--safe-t:env(safe-area-inset-top,44px);--safe-b:env(safe-area-inset-bottom,34px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);font-family:'Share Tech Mono',monospace;color:var(--p);overflow:hidden}
body::before{content:'';position:fixed;inset:0;z-index:999;pointer-events:none;
background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.12) 2px,rgba(0,0,0,.12) 4px)}
body::after{content:'';position:fixed;inset:0;z-index:998;pointer-events:none;
background:radial-gradient(ellipse at center,transparent 55%,rgba(0,0,0,.6) 100%)}

/* LAYOUT */
#app{display:flex;flex-direction:column;height:100vh;height:100dvh}
header{flex-shrink:0;padding:calc(var(--safe-t) + 6px) 16px 11px;
background:linear-gradient(180deg,#0a0f06,var(--c2));border-bottom:1px solid var(--pd);
display:flex;align-items:center;gap:10px}
.hdr-badge{width:34px;height:34px;border-radius:50%;border:2px solid var(--pd);flex-shrink:0;
display:flex;align-items:center;justify-content:center;font-size:16px;
background:radial-gradient(circle,#1a2a10,#0a0f06);animation:pulse 3s ease-in-out infinite}
.hdr-title{font-family:'Oswald',sans-serif;font-weight:700;font-size:14px;letter-spacing:3px;
color:var(--p);text-shadow:0 0 10px rgba(122,255,90,.6)}
.hdr-sub{font-size:9px;letter-spacing:2px;color:var(--pd);margin-top:1px}
.signal{display:flex;gap:4px;margin-left:auto}
.dot{width:6px;height:6px;border-radius:50%;background:var(--p);opacity:.2;animation:blink 1.5s step-end infinite}
.dot:nth-child(2){animation-delay:.5s}.dot:nth-child(3){animation-delay:1s}

#content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.page{display:none}.page.active{display:block}

nav{flex-shrink:0;padding-bottom:var(--safe-b);background:linear-gradient(0deg,#080d05,var(--c1));
border-top:1px solid var(--pd);display:grid;grid-template-columns:repeat(5,1fr)}
.nb{display:flex;flex-direction:column;align-items:center;gap:2px;padding:9px 2px 6px;
background:none;border:none;cursor:pointer;color:var(--pd);
font-family:'Share Tech Mono',monospace;font-size:7px;letter-spacing:.8px;text-transform:uppercase;
border-top:2px solid transparent;transition:all .2s}
.nb span.em{font-size:16px}.nb.active{color:var(--p);border-top-color:var(--p);
filter:drop-shadow(0 0 5px rgba(122,255,90,.7))}

/* SECTION HEADS */
.sh{padding:15px 16px 10px;border-bottom:1px solid rgba(122,255,90,.18);
background:linear-gradient(135deg,var(--c1),var(--c2));position:sticky;top:0;z-index:10}
.sh-tag{font-size:9px;letter-spacing:3px;color:var(--pd);margin-bottom:3px}
.sh-title{font-family:'Oswald',sans-serif;font-weight:600;font-size:21px;letter-spacing:2px;
color:var(--p);text-shadow:0 0 14px rgba(122,255,90,.5)}

/* CARDS / ACCORDIONS */
.acc{border:1px solid rgba(122,255,90,.13);border-radius:3px;background:var(--c1);overflow:hidden;position:relative;margin-bottom:2px}
.acc.amb{border-color:rgba(212,160,23,.2);background:linear-gradient(135deg,#100e04,var(--c1))}
.acc::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;
background:linear-gradient(90deg,transparent,var(--pd),transparent)}
.acc.amb::before{background:linear-gradient(90deg,transparent,var(--am),transparent)}
.acc-hdr{display:flex;align-items:center;gap:10px;padding:10px 13px;cursor:pointer;
color:var(--pd);user-select:none}
.acc.amb .acc-hdr{color:var(--am)}
.acc-body{max-height:0;overflow:hidden;transition:max-height .35s ease}
.acc-body.open{max-height:2000px}
.acc-inner{padding:4px 13px 13px;border-top:1px solid rgba(122,255,90,.08)}
.acc.amb .acc-inner{border-top-color:rgba(212,160,23,.1)}
.chv{margin-left:auto;flex-shrink:0;font-size:11px;transition:transform .25s;color:inherit}
.acc.open .chv{transform:rotate(90deg)}

/* STATS GRID */
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 14px 6px}
.stat-box{background:var(--c1);border:1px solid rgba(122,255,90,.12);border-radius:3px;padding:10px 8px;text-align:center}
.stat-n{font-family:'Oswald',sans-serif;font-size:22px;font-weight:700;color:var(--p);text-shadow:0 0 10px rgba(122,255,90,.4)}
.stat-l{font-size:8px;letter-spacing:1.5px;color:var(--pd);margin-top:2px}

/* BOXES */
.tip{margin:10px 14px;padding:9px 12px;background:rgba(122,255,90,.05);
border:1px solid rgba(122,255,90,.2);border-left:3px solid var(--pd);border-radius:3px;
font-size:10.5px;color:var(--bt);line-height:1.6}
.tip b{color:var(--p);font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:.5px}
.alert{margin:12px 14px;padding:10px 13px;background:rgba(139,26,26,.15);
border:1px solid rgba(139,26,26,.4);border-left:3px solid var(--rd);border-radius:3px}
.alert b,.alert-t{font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:1.5px;color:#ff7070}
.alert p,.alert-b{font-size:10.5px;color:#c07070;line-height:1.6;margin-top:4px}
.warn{margin:8px 14px;padding:9px 12px;background:rgba(212,160,23,.08);
border:1px solid rgba(212,160,23,.25);border-left:3px solid var(--am);border-radius:3px;
font-size:10.5px;color:#9a7830;line-height:1.6}
.warn b{color:var(--am)}

/* SUB LABELS */
.sub-l{padding:11px 14px 4px;font-size:9px;letter-spacing:3px;color:var(--pd);text-transform:uppercase}

/* PROGRESS BAR */
.prog-wrap{margin:10px 14px 6px;background:var(--c1);border:1px solid rgba(122,255,90,.15);border-radius:3px;padding:12px 14px}
.prog-row{display:flex;justify-content:space-between;margin-bottom:6px}
.prog-label{font-family:'Oswald',sans-serif;font-size:12px;color:var(--cr);letter-spacing:1px}
.prog-count{font-family:'Oswald',sans-serif;font-size:12px;color:var(--p)}
.prog-bar{height:4px;background:rgba(122,255,90,.1);border-radius:2px;overflow:hidden;margin-bottom:4px}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--pd),var(--p));border-radius:2px;transition:width .3s}
.prog-sub{font-size:9px;color:var(--pd)}

/* CHECKLIST ITEMS */
.cl-item{display:flex;align-items:flex-start;gap:10px;padding:9px 10px;margin-bottom:2px;
background:var(--c1);border:1px solid rgba(122,255,90,.08);border-radius:3px;cursor:pointer;transition:all .15s}
.cl-item.done{background:rgba(122,255,90,.06);border-color:rgba(122,255,90,.22)}
.cl-item.warn-item{border-left:2px solid var(--rd)}
.cl-item.amber-item{border-left:2px solid var(--am)}
.cl-cb{width:18px;height:18px;border-radius:2px;border:1.5px solid var(--pd);background:transparent;
flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all .15s}
.cl-item.done .cl-cb{border-color:var(--p);background:rgba(122,255,90,.15)}
.cl-tick{display:none;width:10px;height:10px}
.cl-item.done .cl-tick{display:block}
.cl-body{flex:1;min-width:0}
.cl-row{display:flex;align-items:center;gap:6px;margin-bottom:2px;flex-wrap:wrap}
.cl-type{font-size:13px}
.cl-name{font-family:'Oswald',sans-serif;font-size:12px;color:var(--cr);letter-spacing:.5px;transition:all .15s}
.cl-item.done .cl-name{color:rgba(160,200,140,.45);text-decoration:line-through}
.cl-how{font-size:10px;color:var(--bt);line-height:1.5}
.cl-item.done .cl-how{display:none}
.cl-tip-inline{margin-top:4px;font-size:9.5px;color:#6a804a;line-height:1.5;display:none}
.cl-item:not(.done) .cl-tip-inline{display:block}

/* COLLECTIBLE CHECKLIST */
.coll-item{display:flex;align-items:flex-start;gap:9px;padding:8px 10px;margin-bottom:1px;
border:1px solid rgba(122,255,90,.08);border-radius:3px;background:var(--c1);cursor:pointer;transition:all .15s}
.coll-item.g{border-color:rgba(212,160,23,.08)}
.coll-item.done{background:rgba(122,255,90,.06);border-color:rgba(122,255,90,.2)}
.coll-item.g.done{background:rgba(212,160,23,.06);border-color:rgba(212,160,23,.2)}
.coll-item.warn-zone{border-left:2px solid var(--rd)}
.coll-num{width:26px;height:26px;border-radius:2px;background:rgba(122,255,90,.06);
border:1px solid rgba(122,255,90,.2);display:flex;align-items:center;justify-content:center;
font-family:'Oswald',sans-serif;font-weight:700;font-size:11px;color:var(--p);flex-shrink:0}
.coll-item.g .coll-num{background:rgba(212,160,23,.06);border-color:rgba(212,160,23,.2);color:var(--am)}
.coll-item.done .coll-num{opacity:.4}
.coll-info{flex:1;min-width:0}
.coll-area{font-size:9px;color:var(--pd);letter-spacing:1px;margin-bottom:1px}
.coll-item.g .coll-area{color:rgba(212,160,23,.55)}
.coll-loc{font-size:10.5px;color:var(--bt);line-height:1.5}
.coll-item.done .coll-loc{color:rgba(100,120,80,.4);font-size:9.5px}
.coll-extra{font-size:9px;color:#5a7040;margin-top:3px;line-height:1.4;display:none}
.coll-item:not(.done) .coll-extra{display:block}
.coll-warn{font-size:9px;color:#cc6060;margin-top:2px}
.coll-item.done .coll-warn{display:none}
.coll-cb{width:18px;height:18px;border-radius:2px;border:1.5px solid var(--pd);flex-shrink:0;
display:flex;align-items:center;justify-content:center;transition:all .15s}
.coll-item.g .coll-cb{border-color:rgba(212,160,23,.4)}
.coll-item.done .coll-cb{background:rgba(122,255,90,.15);border-color:var(--p)}
.coll-item.g.done .coll-cb{background:rgba(212,160,23,.15);border-color:var(--am)}

/* ZONE HEADER */
.zone-head{margin:10px 14px 4px;padding:8px 12px;border-radius:3px;
background:rgba(122,255,90,.05);border:1px solid rgba(122,255,90,.15);
border-left:3px solid var(--pd)}
.zone-head.g{background:rgba(212,160,23,.05);border-color:rgba(212,160,23,.15);border-left-color:var(--am)}
.zone-head.rd{background:rgba(139,26,26,.1);border-color:rgba(139,26,26,.3);border-left-color:var(--rd)}
.zone-title{font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:1.5px;color:var(--p)}
.zone-head.g .zone-title{color:var(--am)}
.zone-head.rd .zone-title{color:#ff8080}
.zone-warn{font-size:9.5px;color:#ff7070;margin-top:3px;line-height:1.4}
.zone-prog{font-size:9px;color:var(--pd);margin-top:3px}
.zone-head.g .zone-prog{color:rgba(212,160,23,.6)}

/* TAB SWITCHER */
.tab-row{display:flex;margin:10px 14px 6px;border:1px solid rgba(122,255,90,.15);border-radius:3px;overflow:hidden}
.tab-btn{flex:1;padding:8px 4px;background:var(--c1);border:none;color:var(--pd);
font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:1px;cursor:pointer;transition:all .2s}
.tab-btn:first-child{border-right:1px solid rgba(122,255,90,.15)}
.tab-btn.active{background:rgba(122,255,90,.12);color:var(--p)}

/* SEARCH */
.search-wrap{margin:0 14px 8px}
.search-inp{width:100%;padding:8px 10px;background:var(--c1);
border:1px solid rgba(122,255,90,.2);border-radius:3px;color:var(--p);
font-family:'Share Tech Mono',monospace;font-size:11px;outline:none;letter-spacing:1px}
.search-inp::placeholder{color:var(--pd);opacity:1}

/* FOX ITEMS */
.fox-req{display:flex;gap:10px;padding:8px 10px;margin-bottom:2px;
background:rgba(139,26,26,.08);border:1px solid rgba(139,26,26,.2);border-radius:3px}
.fox-ok{display:flex;gap:10px;padding:8px 10px;margin-bottom:2px;
background:rgba(122,255,90,.05);border:1px solid rgba(122,255,90,.15);border-radius:3px}
.fi-icon{font-size:16px;flex-shrink:0;width:22px;text-align:center}
.fi-label{font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:1px;margin-bottom:2px}
.fox-req .fi-label{color:#ff9090}.fox-ok .fi-label{color:var(--p)}
.fi-val{font-size:10.5px;line-height:1.5}
.fox-req .fi-val{color:#a07070}.fox-ok .fi-val{color:var(--bt)}

/* WEAPONS */
.wpn-item{display:flex;align-items:center;gap:10px;padding:9px 10px;margin-bottom:2px;
background:var(--c1);border:1px solid rgba(122,255,90,.1);border-radius:3px;cursor:pointer}
.wpn-icon{font-size:18px;width:28px;text-align:center;flex-shrink:0}
.wpn-name{font-family:'Oswald',sans-serif;font-size:13px;color:var(--cr)}
.wpn-badge{font-size:9px;color:var(--pd);letter-spacing:1px;margin-top:1px}
.wpn-badge.red{color:var(--rd)}.wpn-badge.amber{color:var(--am)}
.wpn-desc{font-size:10.5px;color:var(--bt);line-height:1.7;padding:4px 0 6px}

/* SECRETS */
.sec-item{border:1px solid rgba(212,160,23,.2);border-radius:3px;
background:linear-gradient(135deg,#100e04,var(--c1));overflow:hidden;position:relative;margin-bottom:6px}
.sec-item::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;
background:linear-gradient(90deg,transparent,var(--am),transparent)}
.sec-hdr{display:flex;align-items:center;gap:10px;padding:11px 13px;cursor:pointer}
.sec-tag{font-size:8px;letter-spacing:2px;color:rgba(212,160,23,.6);margin-bottom:2px}
.sec-title{font-family:'Oswald',sans-serif;font-size:13px;color:var(--am)}
.sec-body{max-height:0;overflow:hidden;transition:max-height .35s ease}
.sec-body.open{max-height:1000px}
.sec-inner{padding:4px 13px 13px;border-top:1px solid rgba(212,160,23,.1);
font-size:10.5px;color:#a08050;line-height:1.75;white-space:pre-wrap}

/* TROPHY ORDER PHASE */
.phase-head{margin:14px 14px 6px;padding:10px 12px;border-radius:3px;border-left:3px solid}
.phase-label{font-family:'Oswald',sans-serif;font-size:12px;font-weight:700;letter-spacing:1.5px;margin-bottom:3px}
.phase-desc{font-size:10px;color:rgba(255,255,255,.4);line-height:1.5}

/* INSTALL BANNER */
.install-banner{margin:12px 14px;padding:12px 14px;
background:linear-gradient(135deg,rgba(122,255,90,.06),rgba(58,140,38,.04));
border:1px solid rgba(122,255,90,.25);border-radius:3px;position:relative;overflow:hidden}
.install-banner::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;
background:linear-gradient(90deg,transparent,var(--p),transparent)}
.install-title{font-family:'Oswald',sans-serif;font-size:12px;letter-spacing:2px;
color:var(--p);margin-bottom:6px}
.install-step{font-size:10.5px;color:var(--bt);line-height:1.7;margin-top:2px}
.install-step b{color:var(--cr)}
.pb{height:12px}

/* ANIMATIONS */
@keyframes blink{0%,100%{opacity:.2}50%{opacity:1}}
@keyframes pulse{0%,100%{box-shadow:0 0 8px rgba(122,255,90,.15)}50%{box-shadow:0 0 20px rgba(122,255,90,.4)}}

/* Scrollbar */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--pd);border-radius:2px}
</style>
</head>
<body>
<div id="app">
<header>
<div class="hdr-badge">🎮</div>
<div>
<div class="hdr-title">MGS DELTA — CODEC GUIDE</div>
<div class="hdr-sub">SNAKE EATER · PS5 · CLASSIFIED</div>
</div>
<div class="signal">
<span class="dot"></span><span class="dot"></span><span class="dot"></span>
</div>
</header>
<div id="content">
<div class="page active" id="pg-order"></div>
<div class="page" id="pg-fox"></div>
<div class="page" id="pg-coll"></div>
<div class="page" id="pg-wpn"></div>
<div class="page" id="pg-sec"></div>
</div>
<nav>
<button class="nb active" data-p="order"><span class="em">📋</span>ORDEN</button>
<button class="nb" data-p="fox"><span class="em">🦊</span>FOXHOUND</button>
<button class="nb" data-p="coll"><span class="em">🐸</span>COLECT.</button>
<button class="nb" data-p="wpn"><span class="em">🔫</span>ARMAS</button>
<button class="nb" data-p="sec"><span class="em">🐍</span>SECRETOS</button>
</nav>
</div>

<script>
/* ═══════════════════════════════════════════════
DATA
═══════════════════════════════════════════════ */

const KEROTAN_ZONES = [
{ label:"VIRTUOUS MISSION (1–5)", warn:"⚠ MISSABLE — Punto de no retorno al encontrar a Sokolov en Rassvet", items:[
{ n:1, area:"Dremuchij South", loc:"Vuelve al inicio tras coger la mochila. Sube la ladera este. Sobre una roca mirando al árbol.", tip:"Primer trofeo disponible. Aquí también está el GA-KO #1 en la misma roca." },
{ n:2, area:"Dremuchij Swampland", loc:"2.º parche de hierba, mira a la derecha: sobre una roca.", tip:"No entres en el pantano todavía. Mantente en el borde sur." },
{ n:3, area:"Dremuchij North", loc:"Camino de la derecha tras el primer soldado. Encima del gran tocón.", tip:"Recuerda: en OSE esta zona no tiene gun. Vuelve desde Rassvet con el M1911." },
{ n:4, area:"Dolinovodno", loc:"Antes de cruzar el puente. Sobre el soporte izquierdo del puente.", tip:"Fácil de ver desde abajo del puente." },
{ n:5, area:"Rassvet", loc:"Norte del edificio destruido, izquierda de la escalera roja. Mira por el agujero de la pared.", tip:"Este es el último de la VM. Recógelo ANTES de encontrar a Sokolov." },
]},
{ label:"OSE — DREMUCHIJ AREA (6–8)", items:[
{ n:6, area:"Dremuchij East (OSE)", loc:"Zona abierta, lado oeste: detrás de unos troncos/logs. Rodea por el norte para mejor ángulo.", tip:"No puedes volver a esta zona después de bajar a Dremuchij North." },
{ n:7, area:"Dremuchij Swampland (OSE)", loc:"Terreno más al este del pantano. Detrás de unos árboles a la derecha.", tip:"Búscalo mientras recolectas animales para Gastronome (ranas, serpientes)." },
{ n:8, area:"Dremuchij North (OSE)", loc:"Desde salida norte, ve suroeste → sur hasta un cruce → gira este → árbol escalable. Arriba, mira noroeste.", tip:"⚠ Sin arma al llegar a esta zona. Regresa desde Rassvet con el M1911 o usa granadas de aturdimiento." },
]},
{ label:"OSE — DOLINOVODNO & RASSVET (9–10)", items:[
{ n:9, area:"Dolinovodno (OSE)", loc:"Extremo norte del puente. Mira al ESTE: en un saliente de la pared del precipicio.", tip:"Cuelgate del puente si tienes problemas para apuntar correctamente." },
{ n:10, area:"Rassvet (OSE)", loc:"Bajo la escalera ROJA del lado oeste. Ve al lado derecho de la escalera.", tip:"Recógelo después de conseguir el AK-47 en la parte superior de la escalera." },
]},
{ label:"OSE — CHYORNYJ PRUD & BOLSHAYA PAST (11–13)", items:[
{ n:11, area:"Chyornyj Prud", loc:"Centro-norte del lago. BUCEA hasta el fondo del lago: está en el suelo.", tip:"Equipa el Brown Face Paint para aguantar más tiempo bajo el agua (reduce consumo O2)." },
{ n:12, area:"Bolshaya Past Base", loc:"2.ª valla eléctrica grande al norte. Antes de cruzarla, mira al ESTE: árboles junto al precipicio.", tip:"Si pasas la valla sin dispararlo, puedes volver por el sur." },
{ n:13, area:"Bolshaya Past Crevice (arena Ocelot)", loc:"Arena de Ocelot. Mira al sureste desde tu posición inicial: en hierba alta a través del hueco.", tip:"Dispara ANTES de atacar a Ocelot para tenerlo controlado. El SVD es perfecto aquí." },
]},
{ label:"OSE — CHYORNAYA CAVE (14–15)", items:[
{ n:14, area:"Chyornaya Cave Branch", loc:"Cámara central con la cascada. En una roca justo en lo alto de la cascada.", tip:"Muy visible con el francotirador. Entra desde el pasadizo principal." },
{ n:15, area:"Chyornaya Cave (salida)", loc:"Sigue los túneles. Habitación con un agujero en el suelo: la rana está dentro del agujero.", tip:"Junto a este punto también está la escalera que sube al combate de The Pain." },
]},
{ label:"OSE — PONIZOVJE & GRANINY GORKI (16–21)", items:[

/* ═══════════════════════════════════════════════
STORAGE
═══════════════════════════════════════════════ */
function save(k,v){ try{localStorage.setItem('mgs_'+k,v?'1':'0')}catch(e){} }
function load(k){ try{return localStorage.getItem('mgs_'+k)==='1'}catch(e){return false} }
function tick(k){save(k,!load(k));renderCurrent()}

/* ═══════════════════════════════════════════════
HELPERS
═══════════════════════════════════════════════ */
const $ = id => document.getElementById(id);
function svg_tick(){ return `<svg width="10" height="10" viewBox="0 0 12 12" fill="none"><polyline points="2 6 5 9 10 3" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>` }

function progBar(done, total, label, sub){
const pct = total > 0 ? Math.round(done/total*100) : 0;
return `<div class="prog-wrap">
<div class="prog-row"><span class="prog-label">${label}</span><span class="prog-count">${done}/${total}</span></div>
<div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
<div class="prog-sub">${sub} — ${pct}% completado</div>
</div>`;
}

function cbItem(key, name, sub, tip, warnCls){
const done = load(key);
return `<div class="cl-item${done?' done':''}${warnCls?' '+warnCls:''}" onclick="tick('${key}')">
<div class="cl-cb">${done?`<svg width="10" height="10" viewBox="0 0 12 12" fill="none"><polyline points="2 6 5 9 10 3" stroke="#7aff5a" stroke-width="2.5" stroke-linecap="round"/></svg>`:''}</div>
<div class="cl-body">
<div class="cl-row">${sub?`<span class="cl-type">${sub}</span>`:''}<span class="cl-name">${name}</span></div>
${tip?`<div class="cl-tip-inline">${tip}</div>`:''}
</div>
</div>`;
}

function collItem(key, n, area, loc, tip, warnTxt, isGako){
const done = load(key);
const g = isGako ? ' g' : '';
return `<div class="coll-item${g}${done?' done':''}${warnTxt?' warn-zone':''}" onclick="tick('${key}')">
<div class="coll-num">${n}</div>
<div class="coll-info">
<div class="coll-area">${area}</div>
<div class="coll-loc">${loc}</div>
${tip?`<div class="coll-extra">💡 ${tip}</div>`:''}
${warnTxt?`<div class="coll-warn">⚠ ${warnTxt}</div>`:''}
</div>
<div class="coll-cb">${done?`<svg width="10" height="10" viewBox="0 0 12 12" fill="none"><polyline points="2 6 5 9 10 3" stroke="${isGako?'#d4a017':'#7aff5a'}" stroke-width="2.5" stroke-linecap="round"/></svg>`:''}</div>
</div>`;
}

function acc(id, hdr, body, amber){
return `<div class="acc${amber?' amb':''}" id="ac-${id}">
<div class="acc-hdr" onclick="toggleAcc('${id}')">${hdr}<span class="chv">▶</span></div>
<div class="acc-body" id="acb-${id}"><div class="acc-inner">${body}</div></div>
</div>`;
}

function secItem(i, s){
return `<div class="sec-item">
<div class="sec-hdr" onclick="toggleSec(${i})">
<span style="font-size:20px;flex-shrink:0">${s.emoji}</span>
<div style="flex:1"><div class="sec-tag">${s.tag}</div><div class="sec-title">${s.title}</div></div>
<span class="chv" id="sc-${i}" style="color:#d4a017">▶</span>
</div>
<div class="sec-body" id="sb-${i}"><div class="sec-inner">${s.body}</div></div>
</div>`;
}

function toggleAcc(id){
const b = $('acb-'+id), a = $('ac-'+id);
const open = b.classList.toggle('open');
a.classList.toggle('open', open);
}
function toggleSec(i){
const b = $('sb-'+i), c = $('sc-'+i);
const open = b.classList.toggle('open');
if(c) c.style.transform = open ? 'rotate(90deg)' : '';
}
function toggleWpn(id){
const el = $(id); if(!el) return;
el.style.display = el.style.display === 'block' ? 'none' : 'block';
}

/* ═══════════════════════════════════════════════
RENDER FUNCTIONS
═══════════════════════════════════════════════ */

function renderOrder(){
const total = TROPHY_PHASES.flatMap(p=>p.steps).length;
const done = TROPHY_PHASES.flatMap(p=>p.steps).filter(s=>load(s.id)).length;
let h = `<div class="sh"><div class="sh-tag">// ORDEN ÓPTIMO DE TROFEOS — CHECKLIST</div><div class="sh-title">📋 ORDEN</div></div>`;
h += progBar(done, total, 'PROGRESO TOTAL', 'Pasos completados');
h += `<div class="tip"><b>ℹ️ CÓMO USAR:</b> Toca cada paso para marcarlo como hecho. Tu progreso se guarda automáticamente. Los pasos 🔖 son recordatorios de coleccionables, no trofeos.</div>`;

TROPHY_PHASES.forEach(phase=>{
const pd = phase.steps.filter(s=>load(s.id)).length;
const pt = phase.steps.length;
const pct = Math.round(pd/pt*100);
const bg = phase.color==='#ff7070'?'rgba(139,26,26,.15)':phase.color==='#d4a017'?'rgba(212,160,23,.08)':'rgba(122,255,90,.05)';
const bdr = phase.color==='#ff7070'?'rgba(139,26,26,.35)':phase.color==='#d4a017'?'rgba(212,160,23,.25)':'rgba(122,255,90,.18)';
h += `<div style="margin:14px 14px 6px;padding:10px 12px;border-radius:3px;background:${bg};border:1px solid ${bdr};border-left:3px solid ${phase.color}">
<div style="font-family:'Oswald',sans-serif;font-size:12px;font-weight:700;color:${phase.color};letter-spacing:1.5px;margin-bottom:3px">${phase.label} (${pd}/${pt} — ${pct}%)</div>
<div style="font-size:10px;color:rgba(255,255,255,.4);line-height:1.5">${phase.desc}</div>
</div>`;
h += `<div style="margin:0 14px 4px">`;
phase.steps.forEach(step=>{
h += cbItem(step.id, step.name, step.type, step.tip);
});
h += `</div>`;
});

h += `<div class="pb"></div>`;
$('pg-order').innerHTML = h;
}

function renderFox(){

{i:"🚨",l:"ALERTAS",v:"0 fases de alerta completas. Las alertas canceladas NO cuentan"},
{i:"💀",l:"KILLS HUMANOS",v:"0 muertes. Mk22 tranquilizante y KO únicamente. Incluyendo todos los jefes"},
{i:"🩹",l:"LESIONES GRAVES",v:"Menos de 20 lesiones graves (las que requieren el menú de Curación)"},
{i:"❤️",l:"DAÑO TOTAL",v:"Menos de 5 barras completas de vida de daño en todo el run"},

{i:"🚫",l:"SPECIAL ITEMS PROHIBIDOS",v:"EZ Gun ❌ — Stealth Camo ❌ — Infinity Face Paint ❌"},
];
const allowed = [
{i:"✅",l:"AT-Camo (ghillie suit)",v:"NO es Special Item. 64 GA-KOs → desbloqueado. En prono = 90-95% sigilo."},
{i:"✅",l:"The Patriot (NG+)",v:"Munición infinita de todo. NO es Special Item. Úsalo para el Mk22 sin agotar ammo."},
{i:"✅",l:"Mk22 (Hush Puppy)",v:"La pistola tranquilizante estándar SÍ está permitida. Tu arma principal del run."},
{i:"✅",l:"Nueva Partida+",v:"Puedes hacer el run en NG+. Los camos de jefes de la Partida 1 te acompañan."},
{i:"✅",l:"Autosaves ilimitados",v:"Puedes recargar el autosave cuantas veces quieras. Delta elimina el límite de guardados."},
{i:"✅",l:"Snake Camo + AT-Camo",v:"Esta combinación en prono = ~90-95% camo index en prácticamente cualquier entorno."},
];
const bosses = [
{n:"The Pain",s:"Hornet Camo en el agua + Mk22 para vaciar stamina. Brown Face Paint para aguantar más tiempo bajo el agua. Permanece en el agua para que sus avispas no te ataquen."},
{n:"The Fear",s:"Spider Camo para camuflarte entre las ramas. Mk22 para stamina. Come los frutos del área para recuperar vida. Él se fatiga rápido — espera y dispara cuando se detenga."},
{n:"The End",s:"SVD + Mk22 alternando. Hornet Camo en hierba alta. Usa el micrófono direccional para oír sus movimientos. El combate más largo — paciencia. Recarga autosave si cometes errores."},
{n:"The Fury",s:"RGB-6 con granadas de gas/flash para aturdir. Mk22 para stamina. Fire Camo reduce su daño por fuego. Dispara el GA-KO #32 AL INICIO del combate antes de enfocarte en él."},
{n:"Volgin",s:"Equipa disfraz de Raikov para que baje la guardia momentáneamente. Aprovecha para disparar con Mk22. Sneaking Suit reduce el daño recibido. Evita sus relámpagos esquivando constantemente."},
{n:"The Sorrow",s:"Camina hasta el final del río. Si no has matado enemigos, hay muy pocos fantasmas. Al final usa la píldora de resurrección del inventario para volver."},
{n:"The Boss",s:"El más difícil. Snake Camo + Sneaking Suit. Mk22 + CQC para vaciar su stamina. Gestiona el daño — tienes un límite de 5 barras en TODO el run. Recarga si recibes demasiado daño."},
];

let h = `<div class="sh"><div class="sh-tag">// RANGO MÁXIMO · GUÍA DEFINITIVA Y CORREGIDA</div><div class="sh-title">🦊 FOXHOUND</div></div>`;
h += `<div class="alert"><div class="alert-t">⚠ LA EZ GUN ESTÁ PROHIBIDA — SPECIAL ITEM</div><div class="alert-b">La EZ Gun cancela automáticamente el rango FOXHOUND. No la equipes ni un segundo durante este run. Es la RECOMPENSA de conseguir este rango, no la herramienta para lograrlo.</div></div>`;
h += `<div class="sub-l">// REQUISITOS EXACTOS (9 CONDICIONES)</div><div style="margin:4px 14px 8px">`;
reqs.forEach(r=>{ h+=`<div class="fox-req"><span class="fi-icon">${r.i}</span><div><div class="fi-label">${r.l}</div><div class="fi-val">${r.v}</div></div></div>` });
h += `</div><div class="sub-l">// SÍ ESTÁ PERMITIDO ✅</div><div style="margin:4px 14px 8px">`;
allowed.forEach(r=>{ h+=`<div class="fox-ok"><span class="fi-icon">${r.i}</span><div><div class="fi-label">${r.l}</div><div class="fi-val">${r.v}</div></div></div>` });
h += `</div><div class="sub-l">// ESTRATEGIA POR JEFE — 0 MUERTES</div><div style="margin:4px 14px 16px">`;
bosses.forEach((b,i)=>{ h+=acc('fox'+i,`<span style="font-size:16px;flex-shrink:0">🎯</span><div style="flex:1"><div style="font-family:'Oswald',sans-serif;font-size:13px;color:#e8dfc0">${b.n}</div></div>`,`<div class="wpn-desc">${b.s}</div>`) });
h += `</div><div class="pb"></div>`;
$('pg-fox').innerHTML = h;
}

let collTab = 'k'; let collSearch = '';
function renderColl(){
const kTotal = KEROTAN_ZONES.flatMap(z=>z.items).length;
const gTotal = GAKO_ZONES.flatMap(z=>z.items).length;
const kDone = KEROTAN_ZONES.flatMap(z=>z.items).filter(it=>load('k'+it.n)).length;
const gDone = GAKO_ZONES.flatMap(z=>z.items).filter(it=>load('g'+it.n)).length;

let h = `<div class="sh"><div class="sh-tag">// 64 KEROTANS + 64 GA-KO · CHECKLIST COMPLETO</div><div class="sh-title">🐸 COLECCIONABLES</div></div>`;
h += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 14px 6px">
<div style="background:#0f1509;border:1px solid rgba(122,255,90,.15);border-radius:3px;padding:10px">
<div style="font-size:18px;margin-bottom:3px">🐸</div>
<div style="font-family:'Oswald',sans-serif;font-size:12px;color:#e8dfc0;margin-bottom:3px">64 KEROTANS</div>
<div style="font-size:9px;color:#6a8050;line-height:1.5">Recompensa: <b style="color:#7aff5a">Stealth Camo</b> (invisibilidad total)</div>
<div style="font-size:11px;color:#7aff5a;margin-top:4px;font-family:'Oswald',sans-serif">${kDone}/64</div>
</div>
<div style="background:#0f1509;border:1px solid rgba(212,160,23,.2);border-radius:3px;padding:10px">
<div style="font-size:18px;margin-bottom:3px">🦆</div>
<div style="font-family:'Oswald',sans-serif;font-size:12px;color:#e8dfc0;margin-bottom:3px">64 GA-KO DUCKS</div>
<div style="font-size:9px;color:#6a8050;line-height:1.5">Recompensa: <b style="color:#d4a017">AT-Camo</b> ✅ Válido en FOXHOUND</div>
<div style="font-size:11px;color:#d4a017;margin-top:4px;font-family:'Oswald',sans-serif">${gDone}/64</div>
</div>
</div>`;
h += `<div class="tip"><b>💡 TRUCO:</b> Equipa el camo GA-KO (en el agua NE de Chyornyj Prud) para oír los Kerotans cuando estás cerca. El AT-Camo es la recompensa más valiosa — es válido en el run FOXHOUND.</div>`;
h += `<div class="tab-row">
<button class="tab-btn${collTab==='k'?' active':''}" onclick="switchCollTab('k')">🐸 KEROTAN (${kDone}/64)</button>
<button class="tab-btn${collTab==='g'?' active':''}" onclick="switchCollTab('g')">🦆 GA-KO (${gDone}/64)</button>
</div>`;
h += `<div class="search-wrap"><input class="search-inp" id="coll-search" placeholder="Buscar zona o número..." value="${collSearch}" oninput="filterColl(this.value)"></div>`;

const zones = collTab === 'k' ? KEROTAN_ZONES : GAKO_ZONES;
const prefix = collTab === 'k' ? 'k' : 'g';
const isGako = collTab === 'g';

zones.forEach((zone, zi)=>{
const zoneItems = collSearch.length > 1
? zone.items.filter(it => it.area.toLowerCase().includes(collSearch.toLowerCase()) || it.loc.toLowerCase().includes(collSearch.toLowerCase()) || String(it.n).includes(collSearch))
: zone.items;
if(zoneItems.length === 0) return;

const zDone = zone.items.filter(it=>load(prefix+it.n)).length;
const g = isGako?' g':'';
const rd = zone.warn?' rd':'';
h += `<div class="zone-head${g}${rd}">
<div class="zone-title">${zone.label}</div>
${zone.warn?`<div class="zone-warn">${zone.warn}</div>`:''}
<div class="zone-prog">${zDone}/${zone.items.length} completados</div>
</div>`;
h += `<div style="margin:0 14px 8px">`;
zoneItems.forEach(it=>{
h += collItem(prefix+it.n, it.n, it.area, it.loc, it.tip||'', '', isGako);
});
h += `</div>`;
});

h += `<div class="pb"></div>`;
$('pg-coll').innerHTML = h;
}

function switchCollTab(tab){ collTab = tab; collSearch = ''; renderColl(); $('pg-coll').scrollTop=0; }
function filterColl(val){ collSearch = val; renderColl();
const inp=$('coll-search'); if(inp){inp.focus();inp.setSelectionRange(inp.value.length,inp.value.length)} }

function renderWeapons(){
let h = `<div class="sh"><div class="sh-tag">// ARMERÍA COMPLETA · UBICACIONES EXACTAS</div><div class="sh-title">🔫 ARSENAL</div></div>`;
h += `<div class="alert"><div class="alert-t">⛔ EZ GUN PROHIBIDA EN FOXHOUND</div><div class="alert-b">La EZ Gun es Special Item. Solo en Partida 1. En FOXHOUND: <b style="color:#ffc0c0">Mk22 + The Patriot + AT-Camo</b>. Las armas de VM se pierden al iniciar OSE.</div></div>`;

WEAPONS_DATA.forEach(cat=>{
h += `<div class="sub-l">// ${cat.cat}</div><div style="margin:4px 14px 8px">`;
cat.items.forEach((w,i)=>{
const wid = 'w'+cat.cat.replace(/\s/g,'')+i;
h += `<div>
<div class="wpn-item" onclick="toggleWpn('${wid}')">
<span class="wpn-icon">${w.icon}</span>
<div style="flex:1;min-width:0">
<div class="wpn-name" style="${w.badgeCls==='red'?'color:var(--rd)':''}">${w.name}</div>
<div class="wpn-badge ${w.badgeCls}">${w.badge}</div>
</div>
<span style="color:var(--pd);font-size:11px">▶</span>
</div>
<div id="${wid}" style="display:none;padding:8px 10px 10px;background:rgba(0,0,0,.2);border:1px solid rgba(122,255,90,.07);border-radius:0 0 3px 3px;margin-bottom:2px">
<div class="wpn-desc">${w.desc}</div>
</div>
</div>`;
});
h += `</div>`;
});
h += `<div class="pb"></div>`;
$('pg-wpn').innerHTML = h;
}

function renderSecrets(){
let h = `<div class="sh"><div class="sh-tag">// DATOS CLASIFICADOS · NIVEL COBRA</div><div class="sh-title">🐍 SECRETOS</div></div>`;
h += `<div class="tip"><b>🎮 LEGADO KOJI:</b> La mayoría de easter eggs del PS2 regresan con nuevas sorpresas exclusivas de Delta. El segundo secret es una corrección importante sobre el FOXHOUND.</div>`;
h += `<div style="margin:8px 14px 16px">`;
SECRETS_DATA.forEach((s,i)=>{ h += secItem(i,s) });
h += `</div><div class="pb"></div>`;
$('pg-sec').innerHTML = h;
}

/* ═══════════════════════════════════════════════
NAVIGATION
═══════════════════════════════════════════════ */
let currentPage = 'order';
const renders = { order:renderOrder, fox:renderFox, coll:renderColl, wpn:renderWeapons, sec:renderSecrets };
const pageIds = { order:'pg-order', fox:'pg-fox', coll:'pg-coll', wpn:'pg-wpn', sec:'pg-sec' };

function showPage(name){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
$(pageIds[name]).classList.add('active');
document.querySelector(`.nb[data-p="${name}"]`).classList.add('active');
currentPage = name;
renders[name]();
$('content').scrollTop = 0;
}

function renderCurrent(){ renders[currentPage](); }

document.querySelectorAll('.nb').forEach(btn=>{
btn.addEventListener('click',()=>showPage(btn.dataset.p));
});

/* ═══════════════════════════════════════════════
INIT
═══════════════════════════════════════════════ */
renderOrder();
renderFox();
renderColl();
renderWeapons();
renderSecrets();
</script>
